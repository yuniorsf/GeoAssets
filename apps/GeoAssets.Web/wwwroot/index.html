<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoAssets — GIS Multiplataforma</title>
    <base href="/" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />

    <!-- Leaflet-Geoman CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css" />

    <!-- GeoAssets styles (from Shared RCL) -->
    <link rel="stylesheet" href="_content/GeoAssets.Shared/css/geoassets.css" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#11111b;color:#cdd6f4;font-family:system-ui">
            <div style="text-align:center">
                <div style="font-size:3rem;margin-bottom:1rem">🗺️</div>
                <p>Cargando GeoAssets...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;background:#f38ba8;color:#11111b;padding:8px 16px;text-align:center;z-index:9999">
        Ha ocurrido un error.
        <a href="." style="font-weight:bold">Recargar</a>
        <span onclick="this.parentElement.style.display='none'" style="cursor:pointer;float:right">✕</span>
    </div>

    <!-- Application Insights JS SDK — direct load -->
    <script src="https://js.monitor.azure.com/scripts/b/ai.3.gbl.min.js"></script>
    <script>
        var ai = new Microsoft.ApplicationInsights.ApplicationInsights({ config: {
            connectionString: "InstrumentationKey=08a1c244-ebba-4ac8-b93d-c1266b769538;IngestionEndpoint=https://centralus-2.in.applicationinsights.azure.com/;LiveEndpoint=https://centralus.livediagnostics.monitor.azure.com/;ApplicationId=3250dc94-5c9c-4b7c-a235-588949102704",
            enableAutoRouteTracking: true
        }});
        ai.loadAppInsights();
        ai.trackPageView();
        window.appInsights = ai;

        // C#-callable helpers (called via IJSRuntime from AppInsightsService)
        window.appInsightsInterop = {
            trackEvent:     function (name, props)              { ai.trackEvent({ name: name }, props); },
            trackTrace:     function (message, severity, props) { ai.trackTrace({ message: message, severityLevel: severity }, props); },
            trackException: function (message, props)           { ai.trackException({ exception: new Error(message) }, props); },
            trackMetric:    function (name, value, props)       { ai.trackMetric({ name: name, average: value }, props); },
            setUser:        function (userId)                   { ai.setAuthenticatedUserContext(userId); }
        };
    </script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <!-- Leaflet-Geoman -->
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>

    <!-- GeoAssets interop (from Shared RCL) -->
    <script src="_content/GeoAssets.Shared/js/geoassets.js"></script>

    <!-- Session activity tracking -->
    <script src="js/session-activity.js"></script>

    <!-- MSAL authentication (must load before Blazor runtime) -->
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>

    <!-- Blazor runtime -->
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
